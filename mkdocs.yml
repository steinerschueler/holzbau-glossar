site_name: Holzbau-Glossar
site_description: >-
  Präzises, normativ belegtes Glossar zum Holzbau — Hauptbegriffe und
  didaktische Subglossar-Hülle, gepflegt im Schweizer Raum, frei zugänglich
  unter CC BY 4.0.
site_url: https://holzbau-glossar.ch/
site_author: holzbau-glossar.ch
copyright: >-
  &copy; 2026 holzbau-glossar.ch —
  <a href="https://creativecommons.org/licenses/by/4.0/deed.de">CC BY 4.0</a>.

docs_dir: src
site_dir: site

theme:
  name: material
  language: de
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Auf Darkmode wechseln
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Auf Hellmodus wechseln
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.prune
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Startseite: index.md
  - Methode:
      - Übersicht: methode/index.md
      - Begriffe und Schema: methode/begriffe.md
      - Eintrag-Erstellung: methode/eintrag-erstellung.md
      - Recherche-Standard: methode/recherche.md
      - Sprachregeln: methode/sprachregeln.md
      - "HG-Konventionen (Volltext)": methode/hg-konventionen.md
  # A-Z-Index und die vier Cluster-Sektionen werden vom Build-Hook
  # (hooks/build_pages.py) hier eingefügt — vor „DOI (Zitieren)".
  - "DOI (Zitieren)": zitieren.md
  - "API (Einbinden)": api.md
  - Lizenz: lizenz.md
  - Impressum: impressum.md
  - Datenschutz: datenschutz.md
# Pilot-Einträge (nur lokal über src/pilot/, gitignored) bleiben aus
# der Nav weg — Direkt-URLs wie /pilot/kerve/ funktionieren trotzdem
# bei lokalem mkdocs serve.

plugins:
  - search:
      lang: de
  - git-revision-date-localized:
      type: iso_date
      locale: de
      enable_creation_date: false
      fallback_to_build_date: true
  # Privacy-Plugin (Material seit 9.4): externe Assets (Google Fonts u.a.)
  # beim Build lokal cachen, damit keine Third-Party-Requests aus dem
  # Browser des Nutzers ausgehen.
  - privacy:
      enabled: true

hooks:
  - hooks/build_pages.py

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/collapsible-sections.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Permalink zu dieser Stelle
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: false
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false
  # Versions-Anker für den Footer — bei jeder neuen Glossar-Welle hier
  # hochzählen (entspricht GitHub-Release-Tag im Site-Repo) und im selben
  # Commit pushen, damit der Footer zur live ausgelieferten Version passt.
  version_label: v0.2.0
  welle: W8
  concept_doi: "10.5281/zenodo.20435319"
  version_doi: "10.5281/zenodo.20441549"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
      name: GitHub-Quellrepo
